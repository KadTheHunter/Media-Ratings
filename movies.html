<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal ratings and reviews for Movies, TV shows, and Anime.">
    <title>Movies Tier List</title>
    <link rel="stylesheet" href="main.min.css"/>
    <style>
        :root {
            --accent-glow: rgba(255, 223, 128, 0.35);
        }
    </style>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="manifest" href="assets/site.webmanifest">
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.1/dist/js-yaml.min.js"></script>
</head>
<body>
<main class="container">
    <nav class="main-nav">
        <a href="index.html" class="nav-link nav-home">🏠 Home</a>
        <a href="movies.html" class="nav-link nav-movies active">🎥 Movies</a>
        <a href="tvshows.html" class="nav-link nav-tv">📺 TV Shows</a>
        <a href="anime.html" class="nav-link nav-anime">🌸 Anime</a>
    </nav>
    <h1>Movies Tier List</h1>
    <p id="entry-count" style="text-align:center; color:#8b949e; margin:-8px 0 2.5rem; font-size:1.05rem;">
        <strong id="total-count">0</strong> rated • <strong id="library-count">0</strong> in library<br>Sorted by Rating → Weight → Watch Date
    </p>

    <div class="search-container">
        <input type="search" id="searchInput" placeholder="Search titles..." aria-label="Search titles">
    </div>

    <button id="backToTop" class="back-to-top">↑</button>

    <section class="tier">
        <h2>S-Tier (9-10/10)</h2>
        <div class="grid" id="s-tier"></div>
    </section>

    <section class="tier">
        <h2>A-Tier (7-8/10)</h2>
        <div class="grid" id="a-tier"></div>
    </section>

    <section class="tier">
        <h2>B-Tier (5-6/10)</h2>
        <div class="grid" id="b-tier"></div>
    </section>
    
    <section class="tier">
        <h2>C-Tier (3-4/10)</h2>
        <div class="grid" id="c-tier"></div>
    </section>
    
    <section class="tier">
        <h2>D-Tier (1-2/10)</h2>
        <div class="grid" id="d-tier"></div>
    </section>
    
    <section class="tier">
        <h2>F-Tier (0/10)</h2>
        <div class="grid" id="f-tier"></div>
    </section>

    <section class="tier">
        <h2 id="unranked-header">Unranked (?/10) ▼</h2>
        <div class="grid" id="unranked-tier"></div>
    </section>
</main>

<dialog id="reviewModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle"></h2>
        <hr>
        <p id="modalReview"></p>
    </div>
</dialog>

<script>
    fetch('data.yml')
        .then(r => r.text())
        .then(text => {
            const allData = jsyaml.load(text);
            window.categoryData = allData.movies;
            populateCards();
        })
        .catch(err => console.error("YAML load failed:", err));
</script>
<script src="card.js"></script>
</body>
</html>
