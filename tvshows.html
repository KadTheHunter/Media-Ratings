<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Shows Tier List</title>
    <link rel="stylesheet" href="main.min.css"/>
    <style>
        :root {
            --accent-glow: rgba(173, 255, 173, 0.35);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.1/dist/js-yaml.min.js"></script>
</head>
<body>
<div class="container">
    <nav>
        <a href="movies.html">Movies</a>
        <a href="tvshows.html">TV Shows</a>
        <a href="anime.html">Anime</a>
    </nav>
    <h1>TV Shows Tier List</h1>

    <div class="tier">
        <h2>S-Tier (9-10/10)</h2>
        <div class="grid" id="s-tier"></div>
    </div>

    <div class="tier">
        <h2>A-Tier (7-8/10)</h2>
        <div class="grid" id="a-tier"></div>
    </div>

    <div class="tier">
        <h2>B-Tier (5-6/10)</h2>
        <div class="grid" id="b-tier"></div>
    </div>
    
    <div class="tier">
        <h2>C-Tier (3-4/10)</h2>
        <div class="grid" id="c-tier"></div>
    </div>
    
    <div class="tier">
        <h2>D-Tier (1-2/10)</h2>
        <div class="grid" id="d-tier"></div>
    </div>
    
    <div class="tier">
        <h2>F-Tier (0/10)</h2>
        <div class="grid" id="f-tier"></div>
    </div>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle"></h2>
        <hr>
        <p id="modalReview"></p>
    </div>
</div>

<script>
    fetch('data.yml')
        .then(r => r.text())
        .then(text => {
            const allData = jsyaml.load(text);
            window.categoryData = allData.tv;
            populateCards();
        })
        .catch(err => console.error("YAML load failed:", err));
</script>
<script src="card.js"></script>
</body>
</html>
