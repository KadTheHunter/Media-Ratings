<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Shows Tier List</title>
    <link rel="stylesheet" href="main.min.css"/>
    <style>
        :root {
            --accent-glow: rgba(173, 255, 173, 0.35);
        }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <a href="movies.html">Movies</a>
        <a href="tvshows.html">TV Shows</a>
        <a href="anime.html">Anime</a>
    </nav>
    <h1>TV Shows Tier List</h1>

    <div class="tier">
        <h2>S-Tier (9-10/10)</h2>
        <div class="grid" id="s-tier"></div>
    </div>

    <div class="tier">
        <h2>A-Tier (7-8/10)</h2>
        <div class="grid" id="a-tier"></div>
    </div>

    <div class="tier">
        <h2>B-Tier (5-6/10)</h2>
        <div class="grid" id="b-tier"></div>
    </div>
    
    <div class="tier">
        <h2>C-Tier (3-4/10)</h2>
        <div class="grid" id="c-tier"></div>
    </div>
    
    <div class="tier">
        <h2>D-Tier (1-2/10)</h2>
        <div class="grid" id="d-tier"></div>
    </div>
    
    <div class="tier">
        <h2>F-Tier (0/10)</h2>
        <div class="grid" id="f-tier"></div>
    </div>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalReview"></p>
    </div>
</div>

<script src="data.js"></script>
<script>
    // Filter data for this category
    const categoryData = mediaData.filter(item => item.category === "tv");

function createCard(item) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div class="poster-container">
            <img src="${item.poster}" alt="${item.title} Poster">
        </div>
        <div class="card-content">
            <h3 class="card-title">${item.title}</h3>
            <p class="card-rating">${item.rating}</p>
        </div>
    `;
    
    // Make the entire card open the review
    card.onclick = () => openModal(item.title, item.review);
    
    return card;
}

    categoryData.forEach(item => {
        const tierGrid = document.getElementById(`${item.tier}-tier`);
        if (tierGrid) {
            tierGrid.appendChild(createCard(item));
        }
    });

    const modal = document.getElementById('reviewModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalReview = document.getElementById('modalReview');
    const closeBtn = document.querySelector('.close');

    function openModal(title, review) {
        modalTitle.textContent = title + ' Review';
        modalReview.innerHTML = review;
        modal.style.display = 'block';
    }

    closeBtn.onclick = () => modal.style.display = 'none';
    window.onclick = (event) => { if (event.target === modal) modal.style.display = 'none'; };
</script>
</body>
</html>
