<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 300 450">
  <rect width="300" height="450" fill="#1a1a1a"/>

  <!-- Clapperboard top stick (angled) -->
  <g transform="rotate(-15, 150, 140)">
    <rect x="70" y="130" width="160" height="25" fill="#333" rx="3"/>
    <!-- Diagonal stripes on top stick -->
    <line x1="80" y1="130" x2="95" y2="155" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="100" y1="130" x2="115" y2="155" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="120" y1="130" x2="135" y2="155" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="140" y1="130" x2="155" y2="155" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="160" y1="130" x2="175" y2="155" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="180" y1="130" x2="195" y2="155" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="200" y1="130" x2="215" y2="155" stroke="#1a1a1a" stroke-width="3"/>
  </g>

  <!-- Main board body -->
  <rect x="70" y="155" width="160" height="120" fill="#333" rx="3"/>

  <!-- Board text lines -->
  <line x1="85" y1="180" x2="215" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="85" y1="205" x2="215" y2="205" stroke="#555" stroke-width="1"/>
  <line x1="85" y1="230" x2="215" y2="230" stroke="#555" stroke-width="1"/>
  <line x1="85" y1="255" x2="215" y2="255" stroke="#555" stroke-width="1"/>


  <!-- Hinge circle -->
  <circle cx="75" cy="155" r="8" fill="#444"/>


  <!-- "NO POSTER" text -->
  <text x="150" y="400" font-family="Arial, sans-serif" font-size="32" fill="#555" text-anchor="middle">NO POSTER</text>
</svg>