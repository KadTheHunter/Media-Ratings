  - title: The Blacklist
    rating: "★★★☆☆ (8/10)"
    review: |
      The Blacklist is one of those shows that starts off amazing, and ends whimpering in a ditch, and yet you can't help but love it because of one single character.
      
      Despite one of the main characters continuing to drag down the show two whole seasons after her death; Despite a solid half of the major storylines left unfinished even while having 220 episodes across 10 seasons to do so (and no cancellation!): the <i>other</i> main character of Raymond Reddington (James Spader) is so masterfully written and acted, that he single-handedly carries the show through all 10 seasons.
      
      Were it not for Spader's performance as Raymond Reddington, The Blacklist would easily be a C-Tier 3/10, or even a D-Tier 2/10; Despite his performance, it's still only an A-Tier 8/10 because <i>good god</i>, would it have killed the writers to wrap up <b>some</b> of the major plotlines?
    poster: https://artworks.thetvdb.com/banners/posters/6401e88074c96.jpg
    tier: a
    watched: "2026-01-09"

