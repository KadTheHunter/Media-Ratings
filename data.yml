  - title: A Knight of the Seven Kingdoms
    rating: "★★★★☆ (7.2/10)"
    review: |
      A Knight of the Seven Kingdoms is a surprisingly good deviation from the typical war and intrigue of the world of Westeros.
      
      I was not a fan of the oft unnecessary visual vulgarity (I feel that Game of Thrones managed to have less, though perhaps my memories are muddled), though it was not nearly bad enough to warrant a drop in my rating.
      
      Quite a good, short show, that (shockingly, for the world of Westeros) manages to tell a story without major plot-holes, loose ends, or a horrifically unsatisfactory ending.
