tv:
  - title: Wednesday
    rating: "★★★★☆ (9/10)"
    review: |
      I'll admit I'm a bit biased towards Wednesday as a slightly edgy introvert, but there are few characters I've come to love more than Wednesday Addams.
      
      Wednesday Addams' (Jenna Ortega) interactions with her family, fellow Outcasts, and emerging enemies were delightfully sarcastic with a lovely dark edge, and contrasted starkly against Enid Sinclair's (Emma Myers) almost offensively bright and bubbly character. The plot as a whole was fairly intriguing, and the reveal of who the antagonist(s) were was not wholly expected!
      
      Unfortunately, I must take off 1 whole point due to the occasional line of woke dialogue shoehorned in (I'm less offended by the message, and more the fact they didn't bother to write it in better), as well as the "Wenclair" shippers in the fanbase, whom I can only describe as rabidly lunatic.
    poster: https://artworks.thetvdb.com/banners/v4/series/397060/posters/632dbd876738d.jpg
    tier: s
    weight: 1
    watched: "2026-02-22"

  - title: Wayne
    rating: "★★★★☆ (9/10)"
    review: |
      Wayne is a good show, and anyone who wants to slander it by saying it's a "redditors fantasy" can fuck off.
      
      Sure it may be a little over top, extremely violent, and occasionally a bit stupid, but I can't help but love it.
      
      Being cancelled after a single season (likely due to being on YouTube TV, which is used by.... who exactly?) was criminal, particularly given the semi-cliff-hanger ending, and obvious intention of a second season.
      
      Come for the crappy teen action-drama, stay for the genuinely good chemistry and increasingly wacky plot.
    poster: https://artworks.thetvdb.com/banners/v4/series/353367/posters/654e202c2609e.jpg
    tier: s

  - title: Taboo
    rating: "★★★★☆ (9/10)"
    review: | 
      You know how in every role Tom Hardy plays, he does some weird or quirky accent and mannerisms? Yeah, this is one time that it's actually <i>perfect</i>.
      
      James Keziah Delaney (Tom Hardy) is what every man secretly wants to be. Strange, strong, operating according to his own personal code, with absolutely no regard for rules put in place by the Crown or the East India Company.
      
      While I wasn't a fan of the incestuous story threads involving his half-sister Zilpha Geary (Oona Chaplin), or the molly house attending Michael 'Godders' Godfrey (Edward Hogg), I <b>love</b> his personal and professional relationships with his fathers young suitor Lorna Bow (Jessie Buckley) and his fathers servant Brace (David Hayman). 
      
      While the main storyline initially seems a bit aimless, it very quickly shapes up and draws you in, and though the ending is a bit of a cliff-hanger (supposedly there will be a season two), it's reasonable enough that it could end there with no issues.
    poster: https://artworks.thetvdb.com/banners/posters/292157-1.jpg
    tier: s
    watched: "2026-01-15"

  - title: The Blacklist
    rating: "★★★☆☆ (8/10)"
    review: |
      The Blacklist is one of those shows that starts off amazing, and ends whimpering in a ditch, and yet you can't help but love it because of one single character.
      
      Despite one of the main characters continuing to drag down the show two whole seasons after her death; Despite a solid half of the major storylines left unfinished even while having 220 episodes across 10 seasons to do so (and no cancellation!): the <i>other</i> main character of Raymond Reddington (James Spader) is so masterfully written and acted, that he single-handedly carries the show through all 10 seasons.
      
      Were it not for Spader's performance as Raymond Reddington, The Blacklist would easily be a C-Tier 3/10, or even a D-Tier 2/10; Despite his performance, it's still only an A-Tier 8/10 because <i>good god</i>, would it have killed the writers to wrap up <b>some</b> of the major plotlines?
    poster: https://artworks.thetvdb.com/banners/posters/6401e88074c96.jpg
    tier: a
    watched: "2026-01-09"

