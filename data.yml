  - title: Wayne
    rating: "★★★★☆ (9/10)"
    review: |
      Wayne is a good show, and anyone who wants to slander it by saying it's a "redditors fantasy" can fuck off.
      
      Sure it may be a little over top, extremely violent, and occasionally a bit stupid, but I can't help but love it.
      
      Being cancelled after a single season (likely due to being on YouTube TV, which is used by.... who exactly?) was criminal, particularly given the semi-cliff-hanger ending, and obvious intention of a second season.
      
      Come for the crappy teen action-drama, stay for the genuinely good chemistry and increasingly wacky plot.
