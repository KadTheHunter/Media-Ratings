  - title: Impulse
    rating: "★★★★☆ (9/10)"
    review: |
      "<b><i>GOD SHIT FUCKING GOD IT DAMN WHYYYYYYYYYYYYYYYYYYYYYYYY</i></b>" or something similar is my only response to finding out that Impulse was cancelled in 2020, and will never have a third season. Thanks YouTube TV. Thanks a fucking million.
      
      Now normally Impulse wouldn't <i>really</i> be my thing; A teenager discovering her latent ability to teleport, in order to escape being sexually assaulted, does not sound like a particularly enticing plot.
      
      That being said, I gave it a shot because it's loosely connected to <b>Jumper</b> (both the series of novels by <i>Steven Gould</i>, and the movie starring <i>Hayden Christensen</i>!), and I was quickly hooked.
      
      Everything from the visuals, to the dialogue, and yes even the plotline was excellent. 
      
      It definitely isn't for everyone, and if my one-liner summary above is off-putting then that's fine (I imagine any actual victims of sexual assault or rape might not want to watch this show), but if you have even the faintest interest in it, whether from that summary, its connection to <i>Jumper</i>, or even just the sci-fi teleportation... give it a shot.
      
      Just be prepared to be unreasonably angry when you finish it and remember there's no third season.
