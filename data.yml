  - title: ted
    rating: "★★★★☆ (8.7/10)"
    review: |
      ted is what you get when you tell Seth MacFarlane he can't do cutaways every five seconds, but otherwise has a blank slate to work with.
      
      Ted (Seth MacFarlane) is every bit as hilarious (and crude) as in the movies, and Johnny (Max Burkholder) is a perfect match of a friend.
      
      While most episodes storylines didn't particularly stand out, there are a plethora of scenes (from one-liners to extended conversations) that are comedy gold; Everything from "Cannibalistic Humanoid Undergound Dwellers" (CHUDs), to the running joke of Ted or Johnny taking a guise or backstory too far. 
      
      There are however a couple storylines that <b>really</b> stood out; Notably "My Two Dads" where a series of pranks on a school bully winds up with Ted and Johnny helping him become a better person, and "Dungeons and Dealers", where they must play (and win) a Dungeons and Dragons campaign in order to score drugs.
      
      Loses a few points overall for progressive undertones shoe-horned into certain episodes, but still a great show well worth a watch.
