  - title: The Book of Boba Fett
    rating: "★★☆☆☆ (3/10)"
    review: |
      "The Book of Boba Fett", otherwise known as "How to Fuck Up a Fan-Favorite Character and then Create The Mandalorian Season 2.5".
      
      Like actually, who the <b><i>fuck</i></b> approved the writing of this show?
      
      If the stupid cuban moped speeder-bikes and their punk body-modding riders had been left out, it could have achieved a respectable 6/10, and had the final ~1/3rd of the show not just been "The Mandalorian: Season 2.5", it might possibly have reached a 7.5/10 or even 8/10.
      
      The first couple episodes were quite good, and the flashbacks to Boba's time in the Tatooine desert living with the Tusken Raiders were genuinely excellent, but after that it's just straight downhill.
      
      Disappointing. Just honestly disappointing.
    poster: https://artworks.thetvdb.com/banners/v4/series/393589/posters/61587826c7cfd.jpg
    tier: c

  - title: Mr Inbetween
    rating: "★★★★☆ (9/10)"
    review: |
      Ray Shoesmith (Scott Ryan) is a surprisingly understandable character, and Mr Inbetween is a surprisingly grounded show.
      
      Mr Inbetween does an excellent job balancing the oft mundane if occasionally intimate goings-on of Ray Shoesmiths day-to-day life as a divorced father of Brittany (Chika Yasumura), and his dark, violent jobs he takes on as a fixer and criminal-for-hire in the Australian underworld.
      
      While Ray is undeniably a criminal--  a thief, murderer, drug mule, assassin, kidnapper and torturer all in one-- it's quite hard to feel sorry for most of his victims. Whether its the stupid and bumbling thugs who try to swindle him, or the pedophile who abducted his daughters friend, most of the people who suffered or died at his hand really did deserve it.
      
      I wasn't a particularly huge fan of his perverted friend Gary (Justin Rosniak), who contributed to some of the worst scenes and dialogue in the show (thank you Gary for introducing us to the concept of a Vajankle, I'm going to go stab my eyes out with a fork now), though I do accept that we all have <i>that one friend</i> like him.
    poster: https://artworks.thetvdb.com/banners/posters/5b918305879b6.jpg
    tier: s
    watched: "2026-01-31"

