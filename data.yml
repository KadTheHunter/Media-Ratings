  - title: Taboo (2017)
    rating: "★★★★☆ (9/10)"
    review: |
      You know how in every role Tom Hardy plays, he does some weird or quirky accent and mannerisms? Yeah, this is one time that it's actually <i>perfect</i>.
      
      James Keziah Delaney (Tom Hardy) is what every man secretly wants to be. Strange, strong, operating according to his own personal code, with absolutely no regard for rules put in place by the Crown or the East India Company.
      
      While I wasn't a fan of the incestuous story threads involving his half-sister Zilpha Geary (Oona Chaplin), or the molly house attending Michael 'Godders' Godfrey (Edward Hogg), I <b>love</b> his personal and professional relationships with his fathers young suitor Lorna Bow (Jessie Buckley) and his fathers servant Brace (David Hayman). 
      
      While the main storyline initially seems a bit aimless, it very quickly shapes up and draws you in, and though the ending is a bit of a cliff-hanger (supposedly there will be a season two), it's reasonable enough that it could end there with no issues.
