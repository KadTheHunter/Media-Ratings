  - title: Skeleton Crew
    rating: "★★★★☆ (8.5/10)"
    review: |
      Skeleton Crew completely took me by surprise.
      
      Unlike other Star Wars shows, it had virtually no promotion, and even less discussion among fans. Yet somehow, it ranks extremely high up there, higher than Ahsoka or The Book of Boba Fett, and almost higher than The Mandalorian!
      
      This is <i>exactly</i> the type of show Star Wars needs more of: exploring a galaxy far far away, without big names like Skywalker or Palpatine, but without completely eschewing the Jedi and the Force à la "Andor".
      
      If you are even vaguely intrigued by the idea of Pirates meets Star Wars meets '80s Adventure Films, then give Skeleton Crew a chance.
    poster: https://artworks.thetvdb.com/banners/v4/series/420600/posters/67507e5a079f0.jpg
    tier: a
    watched: "2026-01-11"


