  - title: Tulsa King
    rating: "★★★★☆ (8.9/10)"
    review: |
      Tulsa King does not immediately inspire confidence in itself, what with the somewhat overdone mob tropes, Sylvester Stallone himself, or the fact it was created by Taylor Sheridan who is better known for slop like <i>Yellowstone</i>, <i>Lioness</i> or <i>Mayor of Kingstown</i>.
      
      It is therefore with great pleasure that I place Tulsa King at the top of A tier with a solid 8.9, because my god did I enjoy it.
      
      Stallone makes for an interesting and engaging mob boss, and while some of the main and supporting characters started off a bit weak, they've all flourished spectacularly. Mitch Keller (Garrett Hedlund), Grace (McKenna Quigley Harrington) and "Bigfoot" (Mike Walkden) in particular became some of the best (if not necessarily most important, at least in "Bigfoot" and Grace's case) characters in the show.
      
      Honestly Tulsa King could be an S tier (if a lower S tier), were it not for the slightly repetitive plotlines, though even that is not enough to drag it down too much.
